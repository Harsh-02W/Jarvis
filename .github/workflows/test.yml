# .github/workflows/test.yml
name: Test

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install flask python-dotenv groq psutil

      - name: Check syntax
        run: python -m py_compile ironman/app.py && echo "Syntax OK."

      - name: Check imports
        run: cd ironman && python -c "import app" || true
